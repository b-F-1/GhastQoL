name: GhastQoL
version: 1.0.0
main: com.example.ghastqol.GhastQoLPlugin
api-version: '26.1'
folia-supported: false
author: YourName
description: 'Quality-of-life tweaks for happy ghasts: faster flight and follow-the-player.'

commands:
  ghastqol:
    description: Manage GhastQoL.
    usage: /ghastqol <reload|rotate>

permissions:
  ghastqol.reload:
    description: Allows reloading the GhastQoL config.
    default: op
  ghastqol.rotate:
    description: Allows aligning a happy ghast's facing to the grid.
    default: true
